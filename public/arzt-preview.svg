<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ecfdf5"/>
      <stop offset="100%" style="stop-color:#d1fae5"/>
    </linearGradient>
    <linearGradient id="wall" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0fdf4"/>
      <stop offset="100%" style="stop-color:#dcfce7"/>
    </linearGradient>
    <linearGradient id="desk" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#bbf7d0"/>
      <stop offset="100%" style="stop-color:#86efac"/>
    </linearGradient>
    <linearGradient id="coat" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f0fdf4"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#059669" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Hintergrund -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Wand-Paneel oben -->
  <rect x="0" y="0" width="800" height="300" fill="url(#wall)"/>
  <rect x="0" y="295" width="800" height="8" fill="#bbf7d0" opacity="0.7"/>

  <!-- Fenster links -->
  <rect x="40" y="40" width="120" height="180" rx="4" fill="#ffffff" opacity="0.6"/>
  <rect x="44" y="44" width="112" height="172" rx="3" fill="#e0f2fe" opacity="0.5"/>
  <line x1="100" y1="44" x2="100" y2="216" stroke="#bae6fd" stroke-width="1.5"/>
  <line x1="44" y1="130" x2="156" y2="130" stroke="#bae6fd" stroke-width="1.5"/>
  <!-- Sonnenstrahlen -->
  <rect x="44" y="44" width="56" height="86" rx="2" fill="#fef9c3" opacity="0.3"/>

  <!-- Pflanze links -->
  <rect x="72" y="285" width="16" height="40" rx="2" fill="#6b7280"/>
  <ellipse cx="80" cy="270" rx="28" ry="24" fill="#16a34a" opacity="0.8"/>
  <ellipse cx="62" cy="282" rx="18" ry="14" fill="#15803d" opacity="0.7"/>
  <ellipse cx="98" cy="278" rx="16" ry="13" fill="#16a34a" opacity="0.9"/>

  <!-- Schreibtisch -->
  <rect x="200" y="295" width="460" height="18" rx="3" fill="url(#desk)" filter="url(#shadow)"/>
  <rect x="220" y="310" width="20" height="80" rx="2" fill="#86efac"/>
  <rect x="620" y="310" width="20" height="80" rx="2" fill="#86efac"/>

  <!-- Monitor auf dem Schreibtisch -->
  <rect x="310" y="200" width="180" height="110" rx="6" fill="#1e293b" filter="url(#shadow)"/>
  <rect x="316" y="206" width="168" height="96" rx="4" fill="#0f172a"/>
  <!-- Monitor-Inhalt: Miniatur-Website -->
  <rect x="316" y="206" width="168" height="18" rx="4" fill="#047857"/>
  <rect x="320" y="210" width="40" height="8" rx="2" fill="#ffffff" opacity="0.9"/>
  <rect x="420" y="211" width="30" height="6" rx="1" fill="#6ee7b7" opacity="0.8"/>
  <rect x="456" y="211" width="24" height="6" rx="1" fill="#6ee7b7" opacity="0.8"/>
  <!-- Website Body -->
  <rect x="320" y="230" width="80" height="6" rx="1" fill="#ffffff" opacity="0.5"/>
  <rect x="320" y="240" width="60" height="4" rx="1" fill="#6ee7b7" opacity="0.4"/>
  <rect x="320" y="248" width="70" height="4" rx="1" fill="#ffffff" opacity="0.3"/>
  <rect x="320" y="262" width="40" height="12" rx="3" fill="#059669"/>
  <!-- Monitor Standfuß -->
  <rect x="387" y="308" width="26" height="8" rx="2" fill="#334155"/>
  <rect x="375" y="314" width="50" height="6" rx="2" fill="#475569"/>

  <!-- Arzt-Figur (stilisiert) -->
  <!-- Körper / Kittel -->
  <rect x="490" y="170" width="90" height="160" rx="8" fill="url(#coat)" filter="url(#shadow)"/>
  <!-- Kragen -->
  <path d="M518 175 L535 195 L552 175" fill="none" stroke="#e2e8f0" stroke-width="2"/>
  <!-- Stethoskop -->
  <path d="M518 200 Q510 230 515 250 Q520 270 535 272 Q550 270 555 250 Q560 230 552 200" fill="none" stroke="#059669" stroke-width="3" stroke-linecap="round"/>
  <circle cx="535" cy="274" r="6" fill="#059669"/>
  <!-- Ausweis -->
  <rect x="510" y="210" width="28" height="36" rx="3" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <rect x="514" y="214" width="12" height="12" rx="6" fill="#6ee7b7"/>
  <rect x="514" y="230" width="20" height="3" rx="1" fill="#86efac"/>
  <rect x="514" y="236" width="14" height="3" rx="1" fill="#a7f3d0"/>
  <!-- Kopf -->
  <circle cx="535" cy="148" r="30" fill="#fde68a" filter="url(#shadow)"/>
  <ellipse cx="535" cy="155" rx="30" ry="22" fill="#fde68a"/>
  <!-- Haare -->
  <path d="M505 145 Q510 120 535 118 Q560 120 565 145 Q558 130 535 128 Q512 130 505 145Z" fill="#92400e"/>
  <!-- Gesicht -->
  <circle cx="524" cy="148" r="3" fill="#78350f"/>
  <circle cx="546" cy="148" r="3" fill="#78350f"/>
  <path d="M524 160 Q535 168 546 160" fill="none" stroke="#78350f" stroke-width="2" stroke-linecap="round"/>

  <!-- Arzt-Mütze / Haube angedeutet -->
  <path d="M505 138 Q510 118 535 116 Q560 118 565 138Z" fill="#047857" opacity="0.8"/>

  <!-- Medizinisches Kreuz (Wand rechts) -->
  <rect x="680" y="80" width="60" height="60" rx="8" fill="#ffffff" opacity="0.7" filter="url(#shadow)"/>
  <rect x="703" y="93" width="14" height="34" rx="3" fill="#059669"/>
  <rect x="693" y="103" width="34" height="14" rx="3" fill="#059669"/>

  <!-- Zertifikate / Bilder rechts oben -->
  <rect x="600" y="60" width="60" height="50" rx="4" fill="#ffffff" opacity="0.6"/>
  <rect x="604" y="64" width="52" height="42" rx="3" fill="#d1fae5"/>
  <rect x="608" y="68" width="44" height="6" rx="1" fill="#059669" opacity="0.6"/>
  <rect x="608" y="78" width="36" height="4" rx="1" fill="#6ee7b7" opacity="0.5"/>
  <rect x="608" y="86" width="40" height="4" rx="1" fill="#6ee7b7" opacity="0.5"/>
  <rect x="608" y="94" width="28" height="10" rx="2" fill="#059669" opacity="0.4"/>

  <!-- Boden -->
  <rect x="0" y="380" width="800" height="120" fill="#f0fdf4" opacity="0.6"/>

  <!-- Subtile Bodenlinien -->
  <line x1="0" y1="400" x2="800" y2="400" stroke="#bbf7d0" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="440" x2="800" y2="440" stroke="#bbf7d0" stroke-width="1" opacity="0.3"/>

  <!-- Wartezimmer-Stuhl -->
  <rect x="100" y="330" width="80" height="50" rx="6" fill="#6ee7b7" opacity="0.6"/>
  <rect x="100" y="310" width="80" height="28" rx="6" fill="#34d399" opacity="0.7"/>
  <rect x="100" y="378" width="16" height="20" rx="2" fill="#86efac"/>
  <rect x="164" y="378" width="16" height="20" rx="2" fill="#86efac"/>

  <!-- Highlights / Lichtreflexe -->
  <ellipse cx="400" cy="50" rx="200" ry="30" fill="#ffffff" opacity="0.08"/>
</svg>
